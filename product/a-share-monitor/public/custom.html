<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自选股 - A 股实时监控</title>
  <link rel="stylesheet" href="css/sidebar.css?v=20260415">
  <link rel="stylesheet" href="css/style.css?v=20260417">
  <link rel="stylesheet" href="css/custom.css?v=20260415">
</head>
<body>
  <div class="container">
    <!-- 侧边栏导航 -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>📊 系统导航</h2>
        
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-link" data-page="home">
          <span class="link-icon">🏠</span>
          <span class="link-text">首页</span>
        </a>
        <a href="/stock" class="sidebar-link" data-page="stock">
          <span class="link-icon">📈</span>
          <span class="link-text">证券行情</span>
        </a>
        <a href="/custom" class="sidebar-link active" data-page="custom">
          <span class="link-icon">⭐</span>
          <span class="link-text">自定义</span>
        </a>
        <a href="/data-manager" class="sidebar-link" data-page="data-manager" data-requires-admin="true">
          <span class="link-icon">🗄️</span>
          <span class="link-text">数据管理</span>
        </a>
        <a href="/system" class="sidebar-link" data-page="system" data-requires-admin="true">
          <span class="link-icon">⚙️</span>
          <span class="link-text">系统管理</span>
        </a>
        <a href="/users" class="sidebar-link" data-page="users" data-requires-admin="true">
          <span class="link-icon">👥</span>
          <span class="link-text">用户管理</span>
        </a>
        <a href="/change-password" class="sidebar-link" data-page="change-password" data-requires-user="true">
          <span class="link-icon">🔑</span>
          <span class="link-text">修改密码</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-profile">
          <span class="user-avatar">👤</span>
          <span class="user-display-name" id="sidebar-username">--</span>
        </div>
        <button class="btn-logout-sidebar" id="sidebar-logout-btn" title="退出登录">
          🚪 退出登录
        </button>
      </div>
    </aside>

    <!-- 二级侧边栏 -->
    <aside class="sub-sidebar" id="sub-sidebar">
      <div class="sub-sidebar-header">
        <h3>⭐ 自定义</h3>
      </div>
      <nav class="sub-sidebar-nav">
        <a href="/custom" class="sub-sidebar-link active">
          <span class="link-icon">⭐</span>
          <span class="link-text">自选股</span>
        </a>
        <a href="/positions" class="sub-sidebar-link">
          <span class="link-icon">📊</span>
          <span class="link-text">持仓</span>
        </a>
      </nav>
    </aside>

    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-left">
        <button class="btn-menu-toggle" id="menu-toggle">☰</button>
        <div class="page-title-group">
          <h1>⭐ 自选股</h1>
          <div class="datetime-display">
            <span id="current-date">--</span>
            <span id="current-time">--:--:--</span>
            <span class="timezone-label">北京时间</span>
          </div>
        </div>
      </div>
      <div class="header-controls">
        <div class="refresh-control-group">
          <label class="refresh-label">刷新间隔:</label>
          <select id="refresh-select" class="refresh-select">
            <option value="1">1 秒</option>
            <option value="2">2 秒</option>
            <option value="3" selected>3 秒</option>
            <option value="5">5 秒</option>
            <option value="10">10 秒</option>
          </select>
          <span id="refresh-status" class="refresh-status">运行中</span>
        </div>
        <button id="pause-btn" class="btn btn-pause">⏸️ 暂停</button>
        <button id="refresh-btn" class="btn btn-primary">🔄 立即刷新</button>
        <a href="/" class="btn">🏠 首页</a>
      </div>
    </header>

    <!-- 添加股票区域 -->
    <section class="add-stock-section">
      <div class="add-stock-box">
        <input type="text" id="stock-input" class="stock-input" 
               placeholder="输入股票代码或名称（如：600519、贵州茅台）" 
               maxlength="20" autocomplete="off">
        <button id="add-btn" class="btn btn-primary">➕ 添加</button>
      </div>
      <div id="search-suggestions" class="search-suggestions" style="display: none;"></div>
      
      <!-- 指数展示区域 -->
      <div id="index-display" class="index-display">
        <div class="index-item" data-code="sh000001">
          <span class="index-name">上证指数</span>
          <span class="index-value" id="index-sh000001-value">--</span>
          <span class="index-change" id="index-sh000001-change">--</span>
        </div>
        <div class="index-item" data-code="sz399001">
          <span class="index-name">深证成指</span>
          <span class="index-value" id="index-sz399001-value">--</span>
          <span class="index-change" id="index-sz399001-change">--</span>
        </div>
        <div class="index-item" data-code="sz399006">
          <span class="index-name">创业板指</span>
          <span class="index-value" id="index-sz399006-value">--</span>
          <span class="index-change" id="index-sz399006-change">--</span>
        </div>
        <div class="index-item" data-code="sh000688">
          <span class="index-name">科创 50</span>
          <span class="index-value" id="index-sh000688-value">--</span>
          <span class="index-change" id="index-sh000688-change">--</span>
        </div>
        <div class="index-item" data-code="sh000905">
          <span class="index-name">中证 500</span>
          <span class="index-value" id="index-sh000905-value">--</span>
          <span class="index-change" id="index-sh000905-change">--</span>
        </div>
        <div class="index-item" data-code="hkHSI">
          <span class="index-name">恒生指数</span>
          <span class="index-value" id="index-hkHSI-value">--</span>
          <span class="index-change" id="index-hkHSI-change">--</span>
        </div>
      </div>
    </section>

    <!-- 股票列表 -->
    <section class="stock-list-section">
      <div class="list-header">
        <h2>📋 我的自选股 (<span id="stock-count">0</span>)</h2>
        <button id="clear-all-btn" class="btn btn-danger" style="display: none;">🗑️ 清空全部</button>
      </div>
      
      <!-- 排序按钮组 -->
      <div class="sort-buttons" id="sort-buttons" style="display: none;">
        <div class="sort-btn-group">
          <label>排序：</label>
          <button class="sort-option active" data-sort="default">默认</button>
          <button class="sort-option" data-sort="changePercent">涨跌幅</button>
          <button class="sort-option" data-sort="price">价格</button>
          <button class="sort-option" data-sort="turnoverRate">换手率</button>
        </div>
      </div>
      
      <!-- 空状态提示 -->
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">📭</div>
        <p>暂无自选股</p>
        <p class="empty-hint">在上方输入框添加股票代码或名称</p>
      </div>

      <!-- 股票卡片列表 -->
      <div id="stock-list" class="stock-list"></div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
      <div class="footer-info">
        <span id="last-update">最后更新：--</span>
        <span id="market-status">市场状态：--</span>
      </div>
      <div class="copyright">
        版权所有：营长
      </div>
    </footer>
  </div>

  <script src="js/sidebar.js?v=20260422"></script>
  <script src="js/custom.js?v=20260413"></script>
</body>
</html>
