<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分时数据查询 - A 股实时监控</title>
  <link rel="stylesheet" href="css/sidebar.css?v=20260410">
  <link rel="stylesheet" href="css/style.css?v=20260433">
  <link rel="stylesheet" href="css/data-manager.css">
  <style>
    .query-form {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .form-group label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .form-group input, .form-group select {
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
    }
    
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    
    .btn-query {
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--accent-color) 0%, #096dd9 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      align-self: flex-end;
    }
    
    .btn-query:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
    }
    
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-secondary);
      border-radius: 12px;
      overflow: hidden;
    }
    
    .data-table th, .data-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    
    .data-table th {
      background: var(--bg-card);
      font-weight: 600;
      color: var(--text-primary);
      font-size: 13px;
    }
    
    .data-table td {
      color: var(--text-secondary);
      font-size: 13px;
    }
    
    .data-table tr:hover {
      background: var(--bg-card);
    }
    
    .price-up {
      color: #ff4d4f;
    }
    
    .price-down {
      color: #52c41a;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: 12px;
    }
    
    .pagination button {
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .pagination button:hover:not(:disabled) {
      background: var(--accent-color);
      border-color: var(--accent-color);
    }
    
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .pagination span {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 侧边栏导航 -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>📊 系统导航</h2>
        <button class="btn-close-sidebar" id="close-sidebar">✕</button>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-link" data-page="home">
          <span class="link-icon">🏠</span>
          <span class="link-text">首页</span>
        </a>
        <a href="/stock" class="sidebar-link" data-page="stock">
          <span class="link-icon">📈</span>
          <span class="link-text">证券行情</span>
        </a>
        <a href="/custom" class="sidebar-link" data-page="custom">
          <span class="link-icon">⭐</span>
          <span class="link-text">自定义</span>
        </a>
        <a href="/data-manager" class="sidebar-link active" data-page="data-manager">
          <span class="link-icon">🗄️</span>
          <span class="link-text">数据管理</span>
        </a>
        <a href="/system" class="sidebar-link" data-page="system">
          <span class="link-icon">⚙️</span>
          <span class="link-text">系统管理</span>
        </a>
        <a href="/users" class="sidebar-link" data-page="users">
          <span class="link-icon">👥</span>
          <span class="link-text">用户管理</span>
        </a>
        <a href="/change-password" class="sidebar-link" data-page="change-password" data-requires-user="true">
          <span class="link-icon">🔑</span>
          <span class="link-text">修改密码</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-profile">
          <span class="user-avatar">👤</span>
          <span class="user-display-name" id="sidebar-username">--</span>
        </div>
        <button class="btn-logout-sidebar" id="sidebar-logout-btn" title="退出登录">
          🚪 退出登录
        </button>
      </div>
    </aside>

    <!-- 二级侧边栏 -->
    <aside class="sub-sidebar" id="sub-sidebar">
      <div class="sub-sidebar-header">
        <h3>🗄️ 数据管理</h3>
      </div>
      <nav class="sub-sidebar-nav">
        <a href="/data-manager" class="sub-sidebar-link">
          <span class="link-icon">👥</span>
          <span class="link-text">用户数据管理</span>
        </a>
        <a href="/custom" class="sub-sidebar-link">
          <span class="link-icon">⭐</span>
          <span class="link-text">自选股数据</span>
        </a>
        <a href="/securities" class="sub-sidebar-link">
          <span class="link-icon">📊</span>
          <span class="link-text">证券信息</span>
        </a>
        <a href="/tick-trade" class="sub-sidebar-link">
          <span class="link-icon">📝</span>
          <span class="link-text">逐笔成交明细</span>
        </a>
        <a href="/intraday-data" class="sub-sidebar-link active">
          <span class="link-icon">📈</span>
          <span class="link-text">分时数据查询</span>
        </a>
      </nav>
    </aside>

    <!-- 顶部导航 -->
    <header class="header has-sub-sidebar">
      <div class="header-left">
        <button class="btn-menu-toggle" id="menu-toggle">☰</button>
        <h1>📈 分时数据查询</h1>
      </div>
      <div class="header-controls">
        <a href="/" class="btn">🏠 返回首页</a>
      </div>
    </header>

    <!-- 主要内容区 -->
    <main class="main-content has-sub-sidebar">
      <!-- 查询表单 -->
      <div class="query-form">
        <div class="form-group">
          <label>股票代码</label>
          <input type="text" id="stock-code" placeholder="输入 6 位代码">
        </div>
        <div class="form-group">
          <label>交易日期</label>
          <input type="date" id="trade-date">
        </div>
        <div class="form-group">
          <label>市场</label>
          <select id="market">
            <option value="">全部</option>
            <option value="sh">沪市</option>
            <option value="sz">深市</option>
            <option value="hk">港股</option>
          </select>
        </div>
        <button class="btn-query" id="query-btn">🔍 查询</button>
      </div>

      <!-- 数据表格 -->
      <div id="table-container">
        <table class="data-table">
          <thead>
            <tr>
              <th>时间</th>
              <th>价格</th>
              <th>开盘</th>
              <th>最高</th>
              <th>最低</th>
              <th>成交量</th>
              <th>成交额</th>
              <th>昨收</th>
              <th>涨跌</th>
            </tr>
          </thead>
          <tbody id="data-body">
            <tr>
              <td colspan="9" class="empty-state">
                <div class="icon">📊</div>
                <p>请输入查询条件</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 分页 -->
      <div class="pagination" id="pagination" style="display: none;">
        <button id="prev-btn" disabled>⏮ 上一页</button>
        <span id="page-info">第 1 页 / 共 1 页</span>
        <button id="next-btn" disabled>下一页 ⏭</button>
      </div>
    </main>
  </div>

  <script src="js/sidebar.js?v=20260410"></script>
  <script>
    // 分时数据查询页面逻辑
    const QueryState = {
      page: 1,
      pageSize: 50,
      total: 0
    };
    
    document.addEventListener('DOMContentLoaded', () => {
      console.log('📈 分时数据查询页面初始化...');
      
      // 设置默认日期为今天
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('trade-date').value = today;
      
      // 绑定事件
      document.getElementById('query-btn').addEventListener('click', () => {
        QueryState.page = 1;
        queryData();
      });
      
      document.getElementById('prev-btn').addEventListener('click', () => {
        if (QueryState.page > 1) {
          QueryState.page--;
          queryData();
        }
      });
      
      document.getElementById('next-btn').addEventListener('click', () => {
        const maxPage = Math.ceil(QueryState.total / QueryState.pageSize);
        if (QueryState.page < maxPage) {
          QueryState.page++;
          queryData();
        }
      });
      
      // 自动查询
      queryData();
    });
    
    async function queryData() {
      const stockCode = document.getElementById('stock-code').value.trim();
      const tradeDate = document.getElementById('trade-date').value;
      const market = document.getElementById('market').value;
      
      const params = new URLSearchParams({
        page: QueryState.page,
        pageSize: QueryState.pageSize
      });
      
      if (stockCode) params.append('stock_code', stockCode);
      if (tradeDate) params.append('trade_date', tradeDate.replace(/-/g, ''));
      if (market) params.append('market', market);
      
      try {
        const response = await fetch(`/api/intraday-data?${params}`);
        const result = await response.json();
        
        if (result.success) {
          renderTable(result.data);
          renderPagination(result.total);
        } else {
          showError(result.message || '查询失败');
        }
      } catch (error) {
        console.error('查询失败:', error);
        showError('网络错误');
      }
    }
    
    function renderTable(data) {
      const tbody = document.getElementById('data-body');
      
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><div class="icon">📭</div><p>暂无数据</p></td></tr>';
        return;
      }
      
      tbody.innerHTML = data.map(item => {
        const change = item.price - item.prevClose;
        const changePercent = item.prevClose > 0 ? (change / item.prevClose * 100) : 0;
        const changeClass = change >= 0 ? 'price-up' : 'price-down';
        const changeSign = change >= 0 ? '+' : '';
        
        return `<tr>
          <td>${item.time}</td>
          <td class="${changeClass}">${item.price.toFixed(2)}</td>
          <td>${item.open.toFixed(2)}</td>
          <td>${item.high.toFixed(2)}</td>
          <td>${item.low.toFixed(2)}</td>
          <td>${formatNumber(item.volume)}</td>
          <td>${formatAmount(item.amount)}</td>
          <td>${item.prevClose.toFixed(2)}</td>
          <td class="${changeClass}">${changeSign}${change.toFixed(2)} (${changeSign}${changePercent.toFixed(2)}%)</td>
        </tr>`;
      }).join('');
    }
    
    function renderPagination(total) {
      QueryState.total = total;
      const pagination = document.getElementById('pagination');
      const pageInfo = document.getElementById('page-info');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      
      if (total === 0) {
        pagination.style.display = 'none';
        return;
      }
      
      pagination.style.display = 'flex';
      const maxPage = Math.ceil(total / QueryState.pageSize);
      pageInfo.textContent = `第 ${QueryState.page} 页 / 共 ${maxPage} 页`;
      prevBtn.disabled = QueryState.page <= 1;
      nextBtn.disabled = QueryState.page >= maxPage;
    }
    
    function formatNumber(num) {
      if (!num) return '0';
      if (num >= 1e8) return (num / 1e8).toFixed(2) + '亿';
      if (num >= 1e4) return (num / 1e4).toFixed(2) + '万';
      return num.toString();
    }
    
    function formatAmount(amount) {
      if (!amount) return '0';
      if (amount >= 1e8) return (amount / 1e8).toFixed(2) + '亿';
      if (amount >= 1e4) return (amount / 1e4).toFixed(2) + '万';
      return amount.toFixed(0);
    }
    
    function showError(message) {
      const tbody = document.getElementById('data-body');
      tbody.innerHTML = `<tr><td colspan="9" class="empty-state"><div class="icon">⚠️</div><p>${message}</p></td></tr>`;
    }
  </script>
</body>
</html>
