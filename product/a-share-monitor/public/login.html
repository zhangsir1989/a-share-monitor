<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - A 股实时监控</title>
  <style>
    :root {
      /* 与首页保持一致的深色主题 */
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #21262d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --border-color: #30363d;
      --up-color: #ff4d4f;
      --down-color: #52c41a;
      --flat-color: #faad14;
      --accent-color: #1890ff;
      
      /* 登录页面特有 */
      --primary-color: #1890ff;
      --primary-hover: #40a9ff;
      --error-color: #ef4444;
      --success-color: #10b981;
      --shadow-color: rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-primary);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* 背景装饰（与首页风格一致） */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(24, 144, 255, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      top: -150px;
      right: -150px;
      animation: float 6s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(82, 196, 26, 0.05) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -100px;
      left: -100px;
      animation: float 8s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 8px 32px var(--shadow-color);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent-color) 0%, #096dd9 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      box-shadow: 0 8px 24px rgba(24, 144, 255, 0.25);
    }

    .login-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--text-secondary);
      transition: color 0.3s;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      font-size: 15px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.15);
    }

    .form-input:focus + .input-icon {
      color: var(--accent-color);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-wrapper input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--primary-color);
    }

    .checkbox-label {
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .forgot-password {
      font-size: 14px;
      color: var(--accent-color);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-password:hover {
      color: var(--primary-hover);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-color) 0%, #096dd9 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(24, 144, 255, 0.2);
    }

    .login-btn:hover {
      background: linear-gradient(135deg, var(--primary-hover) 0%, #1890ff 100%);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(24, 144, 255, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error-color);
      color: #ff7875;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      gap: 8px;
      animation: shake 0.5s;
    }

    .error-message.show {
      display: flex;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success-color);
      color: #5cdbd3;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .success-message.show {
      display: flex;
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* 加载动画 */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px;
      }

      .login-title {
        font-size: 24px;
      }

      .form-options {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">📈</div>
        <h1 class="login-title">A 股实时监控</h1>
        <p class="login-subtitle">请登录以继续访问</p>
      </div>

      <div id="error-message" class="error-message">
        <span>⚠️</span>
        <span id="error-text">用户名或密码错误</span>
      </div>

      <div id="success-message" class="success-message">
        <span>✅</span>
        <span>登录成功，正在跳转...</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="username" 
              class="form-input" 
              placeholder="请输入用户名"
              autocomplete="username"
              required
            >
            <span class="input-icon">👤</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="请输入密码"
              autocomplete="current-password"
              required
            >
            <span class="input-icon">🔒</span>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="remember-me">
            <span class="checkbox-label">记住我</span>
          </label>
          <a href="#" class="forgot-password" onclick="alert('请联系管理员重置密码'); return false;">忘记密码？</a>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          登录
        </button>
      </form>

      <div class="footer-text">
        版权所有 © 2026 A 股实时监控系统
      </div>
    </div>
  </div>

  <script>
    // 页面加载时检查是否已登录
    window.addEventListener('DOMContentLoaded', () => {
      checkRememberedCredentials();
    });

    // 检查记住的凭证
    function checkRememberedCredentials() {
      const remembered = localStorage.getItem('rememberedCredentials');
      if (remembered) {
        try {
          const { username, password } = JSON.parse(remembered);
          document.getElementById('username').value = username;
          document.getElementById('password').value = password;
          document.getElementById('remember-me').checked = true;
        } catch (e) {
          localStorage.removeItem('rememberedCredentials');
        }
      }
    }

    // 登录表单提交
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('remember-me').checked;
      const loginBtn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-message');
      const successMsg = document.getElementById('success-message');

      // 隐藏之前的消息
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      // 禁用按钮，显示加载状态
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span> 登录中...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
          // 登录成功
          successMsg.classList.add('show');
          
          // 记住凭证
          if (rememberMe) {
            localStorage.setItem('rememberedCredentials', JSON.stringify({
              username,
              password
            }));
          } else {
            localStorage.removeItem('rememberedCredentials');
          }

          // 保存登录状态
          localStorage.setItem('isLoggedIn', 'true');
          localStorage.setItem('username', username);
          localStorage.setItem('loginTime', new Date().toISOString());
          localStorage.setItem('userRole', result.role || 'user');

          // 延迟跳转
          setTimeout(() => {
            // 获取原始目标页面
            const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
            window.location.href = redirect;
          }, 1000);
        } else {
          // 登录失败
          errorMsg.querySelector('#error-text').textContent = result.message || '用户名或密码错误';
          errorMsg.classList.add('show');
          loginBtn.disabled = false;
          loginBtn.textContent = '登录';
        }
      } catch (error) {
        console.error('登录失败:', error);
        errorMsg.querySelector('#error-text').textContent = '网络错误，请稍后重试';
        errorMsg.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    });

    // 输入框聚焦时隐藏错误消息
    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('focus', () => {
        document.getElementById('error-message').classList.remove('show');
      });
    });
  </script>
</body>
</html>
