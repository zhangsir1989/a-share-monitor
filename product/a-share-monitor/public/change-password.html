<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - A 股实时监控</title>
  <link rel="stylesheet" href="css/sidebar.css?v=20260405">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/users.css">
</head>
<body>
  <div class="container">
    <!-- 侧边栏导航 -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>📊 系统导航</h2>
        <button class="btn-close-sidebar" id="close-sidebar">✕</button>
      </div>
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-link" data-page="home">
          <span class="link-icon">🏠</span>
          <span class="link-text">首页</span>
        </a>
        <a href="/stock" class="sidebar-link" data-page="stock">
          <span class="link-icon">📈</span>
          <span class="link-text">证券行情</span>
        </a>
        <a href="/custom" class="sidebar-link" data-page="custom">
          <span class="link-icon">⭐</span>
          <span class="link-text">自定义</span>
        </a>
        <a href="/data-manager" class="sidebar-link" data-page="data-manager" data-requires-admin="true">
          <span class="link-icon">🗄️</span>
          <span class="link-text">数据管理</span>
        </a>
        <a href="/system" class="sidebar-link" data-page="system" data-requires-admin="true">
          <span class="link-icon">⚙️</span>
          <span class="link-text">系统管理</span>
        </a>
        <a href="/users" class="sidebar-link" data-page="users" data-requires-admin="true">
          <span class="link-icon">👥</span>
          <span class="link-text">用户管理</span>
        </a>
        <a href="/change-password" class="sidebar-link active" data-page="change-password">
          <span class="link-icon">🔑</span>
          <span class="link-text">修改密码</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-profile">
          <span class="user-avatar">👤</span>
          <span class="user-display-name" id="sidebar-username">--</span>
        </div>
        <button class="btn-logout-sidebar" id="sidebar-logout-btn" title="退出登录">
          🚪 退出登录
        </button>
      </div>
    </aside>

    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-top">
        <div class="header-left">
          <button class="btn-menu-toggle" id="menu-toggle">☰</button>
          <h1>🔑 修改密码</h1>
        </div>
        <div class="header-controls">
          <div class="user-info" id="user-info">
            <span class="user-name" id="user-name"></span>
            <button class="btn btn-logout" id="logout-btn" title="退出登录">🚪</button>
          </div>
        </div>
      </div>
    </header>

    <!-- 主要内容区 -->
    <main class="main-content">
      <div class="change-password-container">
        <div class="password-form-card">
          <div class="form-header">
            <h2>修改登录密码</h2>
            <p>请确保新密码安全且易于记忆</p>
          </div>
          
          <form id="change-password-form" class="password-form">
            <div class="form-group">
              <label class="form-label" for="current-password">当前密码 <span class="required">*</span></label>
              <input type="password" id="current-password" class="form-input" maxlength="12" placeholder="请输入当前密码" required>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="new-password">新密码 <span class="required">*</span></label>
              <input type="password" id="new-password" class="form-input" maxlength="12" placeholder="请输入新密码（最多 12 位）" required>
              <div class="password-strength" id="password-strength"></div>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="confirm-password">确认新密码 <span class="required">*</span></label>
              <input type="password" id="confirm-password" class="form-input" maxlength="12" placeholder="请再次输入新密码" required>
              <div class="password-match" id="password-match"></div>
            </div>
            
            <div class="form-actions">
              <button type="submit" class="btn btn-primary btn-large">💾 保存新密码</button>
              <button type="button" class="btn" id="btn-cancel">取消</button>
            </div>
          </form>
          
          <div class="password-tips">
            <h3>💡 密码安全提示</h3>
            <ul>
              <li>密码长度不超过 12 位</li>
              <li>建议使用数字和字母组合</li>
              <li>不要使用过于简单的密码（如 123456）</li>
              <li>定期更换密码可以提高账户安全性</li>
            </ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/sidebar.js?v=20260405"></script>
  <script src="js/change-password.js"></script>
</body>
</html>
