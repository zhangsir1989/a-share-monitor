<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>测试数据源</title>
  <style>
    body { background: #0d1117; color: #f0f6fc; font-family: Arial; padding: 20px; }
    .source-tag { 
      display: inline-block;
      padding: 5px 15px;
      margin: 5px;
      border-radius: 15px;
      background: #21262d;
      border: 1px solid #30363d;
    }
    .sina { background: rgba(82,196,26,0.2); border-color: #52c41a; color: #52c41a; }
    .tencent { background: rgba(24,144,255,0.2); border-color: #1890ff; color: #1890ff; }
  </style>
</head>
<body>
  <h1>数据源测试</h1>
  <div>
    <span>数据来源：</span>
    <span id="volume-source" class="source-tag">加载中...</span>
    <span id="turnover-source" class="source-tag">加载中...</span>
  </div>
  
  <div id="log" style="margin-top: 20px; font-size: 12px; color: #8b949e;"></div>
  
  <script>
    async function testSources() {
      const log = document.getElementById('log');
      try {
        log.innerHTML += '开始请求 API...<br>';
        const resp = await fetch('/api/data-sources?t=' + Date.now());
        log.innerHTML += `状态码：${resp.status}<br>`;
        const data = await resp.json();
        log.innerHTML += `返回数据：${JSON.stringify(data)}<br><br>`;
        
        const volEl = document.getElementById('volume-source');
        const turnEl = document.getElementById('turnover-source');
        
        volEl.textContent = data.volume === 'sina' ? '新浪' : data.volume === 'tencent' ? '腾讯' : '--';
        volEl.className = 'source-tag ' + (data.volume || 'unknown');
        
        turnEl.textContent = data.turnover === 'sina' ? '新浪' : data.turnover === 'tencent' ? '腾讯' : '--';
        turnEl.className = 'source-tag ' + (data.turnover || 'unknown');
        
        log.innerHTML += '✅ 更新成功！';
      } catch (e) {
        log.innerHTML += `❌ 错误：${e.message}`;
      }
    }
    
    testSources();
    setInterval(testSources, 3000);
  </script>
</body>
</html>
